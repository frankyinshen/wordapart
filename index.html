<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS 教学剧本生成器 (精准拼写版)</title>
    <!-- 引入 Compromise 核心库和音节拆分插件 -->
    <script src="https://cdn.jsdelivr.net/npm/compromise"></script>
    <script src="https://cdn.jsdelivr.net/npm/compromise-syllables"></script>
    <style>
        :root {
            --primary-color: #4F46E5;
            --bg-color: #F3F4F6;
            --box-bg: #FFFFFF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #111827;
            margin-bottom: 5px;
        }
        .status {
            text-align: center;
            font-size: 14px;
            color: #D97706;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .status.ready {
            color: #10B981;
        }
        .container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .panel {
            flex: 1;
            background: var(--box-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 400px;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            font-family: monospace;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            background: #EFF6FF;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #BFDBFE;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #4338CA;
        }
        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }
        .btn-copy {
            background-color: #10B981;
            margin-top: 15px;
        }
        .btn-copy:hover {
            background-color: #059669;
        }
        .tips {
            font-size: 14px;
            color: #4B5563;
            margin-bottom: 10px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <h1>🎙️ TTS 教学剧本生成器</h1>
    <div id="engineStatus" class="status">⏳ 正在连接拼写音节引擎...</div>

    <div class="controls">
        <div class="control-group">
            <label for="repCount"><strong>单词示范次数：</strong></label>
            <input type="number" id="repCount" value="3" min="1" max="10">
        </div>
        <button id="generateBtn" onclick="generateScript()" disabled>⚡ 一键生成剧本</button>
    </div>

    <div class="container">
        <!-- 左侧输入 -->
        <div class="panel">
            <h3>输入单词列表</h3>
            <div class="tips">
                • 遇到词组（如 common butterfly），自动保持不拆。<br>
                • 如果引擎拆的不满意，可以用 <b>|</b> 强制指定（如 <code>pupae|pu-pae</code>）。
            </div>
            <textarea id="inputArea">
permanent
aphids
mites
convergent
gel
mealybugs
pupae
common buckeye butterfly</textarea>
        </div>

        <!-- 右侧输出 -->
        <div class="panel">
            <h3>生成的 TTS 剧本</h3>
            <div class="tips">
                • 复制下方文本，粘贴给 TTS 即可完美朗读。<br>
                &nbsp;
            </div>
            <textarea id="outputArea" readonly placeholder="等待引擎加载..."></textarea>
            <button class="btn-copy" onclick="copyResult()">📋 复制剧本</button>
        </div>
    </div>

    <script>
        // 检查 Compromise 库和插件是否加载成功
        window.onload = function() {
            let checkInterval = setInterval(() => {
                // 确保核心库和音节插件都已经加载到浏览器
                if (typeof nlp !== 'undefined' && typeof compromiseSyllables !== 'undefined') {
                    clearInterval(checkInterval);
                    
                    // 将音节插件注册到 NLP 引擎中
                    nlp.plugin(compromiseSyllables);
                    
                    document.getElementById('engineStatus').innerHTML = "✅ 智能拼写音节引擎已连接！";
                    document.getElementById('engineStatus').classList.add('ready');
                    document.getElementById('generateBtn').disabled = false;
                    
                    // 自动生成一次
                    generateScript();
                }
            }, 100);

            // 超时提示
            setTimeout(() => {
                if (typeof nlp === 'undefined') {
                    document.getElementById('engineStatus').innerHTML = "❌ 引擎加载失败，请检查网络连接或刷新页面。";
                    document.getElementById('outputArea').placeholder = "引擎加载失败，无法生成。";
                }
            }, 10000);
        };

        // 核心：调用 Compromise 引擎进行【拼写音节】拆分
        function getSyllablesViaNLP(word) {
            // 包含空格的词组，直接返回原词
            if (word.trim().includes(' ')) {
                return word;
            }

            try {
                // 让引擎分析这个单词
                let doc = nlp(word);
                // 获取音节数组
                let result = doc.terms().syllables();
                
                // 如果成功获取到音节数组，用连字符拼接起来
                if (result && result.length > 0 && result[0].syllables) {
                    return result[0].syllables.join('-');
                }
            } catch (e) {
                console.warn("引擎拆分失败，返回原词: " + word);
            }
            
            // 兜底方案：如果没有拆分成功，返回原词
            return word; 
        }

        // 生成剧本主逻辑
        function generateScript() {
            if (typeof nlp === 'undefined') {
                alert("引擎尚未加载完成，请稍候再试。");
                return;
            }

            const inputText = document.getElementById('inputArea').value;
            const repCount = parseInt(document.getElementById('repCount').value, 10) || 3;
            const lines = inputText.split('\n');
            let result = '';

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                let word = line;
                let syllables = '';

                // 人工干预最高优先级
                if (line.includes('|')) {
                    let parts = line.split('|');
                    word = parts[0].trim();
                    syllables = parts[1].trim();
                } else {
                    // 否则调用 NLP 引擎
                    syllables = getSyllablesViaNLP(word);
                }

                // 生成重复字符串
                let repArray = Array(repCount).fill(word);
                let repetitionPart = repArray.join('... ');

                result += `${repetitionPart}... ${syllables}.\n\n`;
            }

            document.getElementById('outputArea').value = result.trim();
        }

        // 复制到剪贴板功能
        function copyResult() {
            const outputArea = document.getElementById('outputArea');
            if (!outputArea.value) {
                alert('请先生成剧本！');
                return;
            }
            outputArea.select();
            document.execCommand('copy');
            alert('✅ 剧本已复制到剪贴板！可以直接去 TTS 粘贴了。');
        }
    </script>
</body>
</html>
